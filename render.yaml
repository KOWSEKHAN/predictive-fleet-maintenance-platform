# render.yaml — Render.com infrastructure-as-code deployment manifest
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: fleetcare-ai-backend
    runtime: python
    region: oregon      # change to match your preferred Render region
    plan: free          # upgrade to starter/standard for production SLAs

    # ── Build ──────────────────────────────────────────────────────────────────
    buildCommand: |
      pip install -r requirements.txt &&
      python manage.py collectstatic --no-input &&
      python manage.py migrate --no-input

    # ── Start ──────────────────────────────────────────────────────────────────
    # Django module path: backend/backend/wsgi.py → backend.wsgi:application
    # workers = 2*CPU+1 (recommended for free tier: 2)
    startCommand: gunicorn backend.wsgi:application --workers 2 --timeout 120 --bind 0.0.0.0:$PORT

    # ── Root directory (where manage.py lives) ─────────────────────────────────
    rootDir: backend

    # ── Environment Variables ──────────────────────────────────────────────────
    # Values marked sync: false must be set manually in the Render dashboard
    # to avoid committing secrets to source control.
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: backend.settings

      - key: DJANGO_DEBUG
        value: "False"

      - key: SECRET_KEY
        generateValue: true          # Render generates a secure random value

      - key: ALLOWED_HOSTS
        # Replace with your actual Render hostname after first deploy
        value: "fleetcare-ai-backend.onrender.com,localhost,127.0.0.1"

      - key: CORS_ALLOWED_ORIGINS
        # Replace with your actual Vercel frontend URL
        value: "https://your-fleet-frontend.vercel.app,http://localhost:3000"

      - key: DATABASE_URL
        fromDatabase:
          name: fleetcare-ai-db
          property: connectionString

      - key: JWT_ACCESS_MINUTES
        value: "1440"

      - key: JWT_REFRESH_DAYS
        value: "7"

      - key: PYTHON_VERSION
        value: "3.11.11"

databases:
  - name: fleetcare-ai-db
    plan: free
    databaseName: fleetcare_production
    user: fleetcare_admin
    region: oregon
